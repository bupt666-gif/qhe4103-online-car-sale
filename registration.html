<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seller Registration</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h2>Car Sale - Seller Register</h2>
        <nav>
            <a href=" ">Home</a >
            <a href="registration.html">Register</a >
            <a href="login.html">Login</a >
        </nav>
    </header>

    <div class="form-container">
        <h3>Seller Registration Form</h3>
        <form id="regForm" onsubmit="return validateForm()">
            <div class="form-item">
                <label>Full Name</label>
                <input type="text" id="name" placeholder="Only letters & space">
            </div>
            <div class="form-item">
                <label>Address</label>
                <input type="text" id="address" placeholder="Letters, numbers & space">
            </div>
            <div class="form-item">
                <label>Phone</label>
                <input type="text" id="phone" placeholder="China phone number">
            </div>
            <div class="form-item">
                <label>Email</label>
                <input type="text" id="email" placeholder="xxx@xx.com / xxx@xx.cn">
            </div>
            <div class="form-item">
                <label>Username</label>
                <input type="text" id="user" placeholder="Min 6 letters/numbers">
            </div>
            <div class="form-item">
                <label>Password</label>
                <input type="password" id="pwd" placeholder="Min 6 letters/numbers">
            </div>
            <button type="submit">Register</button>
        </form>
    </div>

    <script src="script.js"></script>
</body>
</html>
